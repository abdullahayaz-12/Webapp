name: DockerHub to ACR

on:
  push:
    branches: [ "main" ]

jobs:
  push-to-acr:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ---- Login to Docker Hub ----
    - name: Docker Hub Login
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_PASSWORD }}

    # ---- Pull image from Docker Hub ----
    - name: Pull image from Docker Hub
      run: |
        docker pull mydockerhubusername/myapp:latest

    # ---- Azure Login ----
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # ---- Login to ACR ----
    - name: Login to ACR
      run: az acr login --name ${{ secrets.ACR_NAME }}

    # ---- Tag Docker Hub image for ACR ----
    - name: Tag image for ACR
      run: |
        docker tag mydockerhubusername/myapp:latest ${{ secrets.ACR_NAME }}.azurecr.io/myapp:latest

    # ---- Push image to ACR ----
    - name: Push image to ACR
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/myapp:latest
